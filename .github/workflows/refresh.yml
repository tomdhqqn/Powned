name: Daily refresh

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fetch and score
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_and_score.py

      - name: Commit feeds.json
        run: |
          git config user.name "PowNed Refresh Bot"
          git config user.email "actions@github.com"
          git add feeds.json
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
            exit 0
          fi
          git commit -m "Auto-refresh feeds.json ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Pull-rebase + push met retry voor race-conditions
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              echo "Push gelukt op poging $i"
              exit 0
            fi
            echo "Push faalde op poging $i — even wachten en opnieuw"
            sleep $((i * 5))
          done
          echo "Push faalde na 3 pogingen"
          exit 1  
